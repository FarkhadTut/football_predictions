; Alembic config for the predictor backend.
;
; ``sqlalchemy.url`` is left blank — ``migrations/env.py`` reads it from the
; predictor ``Settings`` so dev and tests agree on a single source of truth.

[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url =
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
