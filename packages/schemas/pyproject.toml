[project]
name = "predictor-schemas"
version = "0.1.0"
description = "Shared Pydantic schemas (Python side of the Python ↔ TS contract)."
requires-python = ">=3.12,<3.13"
dependencies = [
    "pydantic>=2.9",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/predictor_schemas"]
